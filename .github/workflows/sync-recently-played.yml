name: Sync recently played

on:
  schedule:
    - cron: "7,22,37,52 * * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: spotify-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - run: curl --fail --silent --show-error --request POST "$SUPABASE_URL/functions/v1/sync-due-users" --header "apikey: $SUPABASE_SECRET_KEY" --header "Content-Type: application/json" --data "{}"
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
